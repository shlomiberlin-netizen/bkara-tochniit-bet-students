<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקרת שטח — תכנית ב' מעגל השנה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; direction: rtl; font-size: 15px; }
  .page { max-width: 780px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header { background: #fff; border-radius: 12px; border: 1px solid #e0e0dc; padding: 18px 20px; margin-bottom: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #666; }

  /* Meta fields */
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .meta-field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  .meta-field input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif; background: #fff; }
  .meta-field input:focus { outline: none; border-color: #888; }

  /* Progress */
  .progress-wrap { background: #fff; border-radius: 10px; border: 1px solid #e0e0dc; padding: 12px 16px; margin-bottom: 16px; }
  .progress-labels { display: flex; gap: 16px; font-size: 13px; margin-bottom: 6px; }
  .prog-ok { color: #3B6D11; font-weight: 500; }
  .prog-nok { color: #A32D2D; font-weight: 500; }
  .prog-neutral { color: #666; }
  .prog-bar { background: #eee; border-radius: 99px; height: 6px; overflow: hidden; }
  .prog-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; width: 0%; }

  /* Section */
  .section { margin-bottom: 14px; }
  .section-title { font-size: 12px; font-weight: 700; color: #555; letter-spacing: 0.05em; text-transform: uppercase; padding: 0 4px 6px; border-bottom: 1px solid #e0e0dc; margin-bottom: 8px; }

  /* Item card */
  .item-card { background: #fff; border: 1px solid #e0e0dc; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; }
  .item-text { flex: 1; font-size: 13.5px; line-height: 1.55; padding-top: 2px; }
  .tag-critical { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 99px; background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; margin-left: 5px; vertical-align: middle; font-weight: 600; }

  /* Radio buttons */
  .radio-group { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .radio-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid #ccc; cursor: pointer; background: transparent; color: #666; transition: all 0.15s; white-space: nowrap; text-align: center; min-width: 72px; font-family: Arial, sans-serif; }
  .radio-btn:hover { background: #f0f0ee; }
  .radio-btn.ok { background: #EAF3DE; color: #3B6D11; border-color: #97C459; font-weight: 600; }
  .radio-btn.nok { background: #FCEBEB; color: #A32D2D; border-color: #F09595; font-weight: 600; }

  /* Note */
  .note-wrap { margin-top: 7px; }
  .note-input { width: 100%; font-size: 12px; border: 1px solid #e0e0dc; border-radius: 8px; padding: 5px 8px; background: #fafaf8; color: #1a1a1a; font-family: Arial, sans-serif; resize: none; overflow: hidden; min-height: 30px; }
  .note-input:focus { outline: none; border-color: #aaa; }
  .note-input::placeholder { color: #aaa; }

  /* Submit */
  .submit-wrap { margin-top: 20px; margin-bottom: 30px; }
  .submit-btn { width: 100%; padding: 14px; background: #185FA5; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s; }
  .submit-btn:hover { background: #0C447C; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* Toast */
  .toast { display: none; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-top: 12px; text-align: center; font-weight: 500; }
  .toast.success { background: #EAF3DE; color: #3B6D11; border: 1px solid #97C459; }
  .toast.error { background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; }

  /* Summary */
  .summary-btn { width: 100%; padding: 11px; background: #f0f0ee; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: Arial, sans-serif; margin-bottom: 14px; color: #333; }
  .summary-btn:hover { background: #e8e8e5; }
  .summary-box { background: #fff; border: 1px solid #e0e0dc; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .summary-stats { display: flex; border-bottom: 1px solid #e0e0dc; }
  .stat { flex: 1; padding: 10px 8px; text-align: center; border-left: 1px solid #e0e0dc; }
  .stat:last-child { border-left: none; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #666; margin-top: 1px; }
  .stat-ok .stat-num { color: #3B6D11; }
  .stat-nok .stat-num { color: #A32D2D; }
  .stat-pend .stat-num { color: #666; }
  .summary-section-header { padding: 9px 14px; font-size: 13px; font-weight: 700; border-bottom: 1px solid; }
  .summary-nok-header { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .summary-notes-header { background: #E6F1FB; color: #185FA5; border-color: #85B7EB; }
  .summary-body { padding: 8px 14px; }
  .summary-item { font-size: 13px; padding: 7px 0; border-bottom: 1px solid #f0f0ee; line-height: 1.5; }
  .summary-item:last-child { border-bottom: none; }
  .summary-section-label { font-size: 11px; color: #888; margin-bottom: 1px; }
  .summary-note-label { font-size: 11px; color: #666; margin-top: 3px; }
  .empty-msg { font-size: 13px; color: #888; padding: 8px 0; }

  @media (max-width: 500px) {
    .meta-grid { grid-template-columns: 1fr; }
    .radio-btn { min-width: 62px; padding: 4px 8px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>בקרת שטח — תכנית ב׳: אירועים במעגל השנה</h1>
    <p>מלא את כל הסעיפים ולחץ "שלח דוח" — הנתונים יישמרו אוטומטית ב-Google Sheets</p>
  </div>

  <div class="meta-grid">
    <div class="meta-field">
      <label>שם הבקר</label>
      <input type="text" id="inspector" placeholder="שם מלא..." />
    </div>
    <div class="meta-field">
      <label>תאריך הבקרה</label>
      <input type="date" id="visit-date" />
    </div>
    <div class="meta-field">
      <label>שם הסניף</label>
      <input type="text" id="branch" placeholder="שם הסניף / מיקום..." />
    </div>
    <div class="meta-field">
      <label>מוסד אקדמי</label>
      <input type="text" id="institution" placeholder="שם המוסד..." />
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-labels">
      <span class="prog-neutral" id="lbl-total">0 מתוך 0 מולאו</span>
      <span class="prog-ok" id="lbl-ok">✓ 0 תקין</span>
      <span class="prog-nok" id="lbl-nok">✗ 0 לא תקין</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  </div>

  <div id="sections-container"></div>

  <button class="summary-btn" onclick="showSummary()">הצג ריכוז ממצאים ↓</button>
  <div id="summary-box" style="display:none;"></div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">שלח דוח לגוגל שיטס ↗</button>
    <div class="toast" id="toast"></div>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYdcDqUglwWSe1lKKZYlHiJOxK8dOCJ9-wFAzy5bd9HTjHEp9D_RG_tw_qVn-2yukF/exec";

const SECTIONS = [
  { title: "מיקום ומבנה פיזי", items: [
    { id:"s1i1", text:"הפעילות מתקיימת בתוך הקמפוס או בסמיכות אליו, בתיאום ואישור המוסד האקדמי" },
    { id:"s1i2", text:"קיים חדר פעילות קבועה המכיל 50+ סטודנטים בו-זמנית", critical:true },
    { id:"s1i3", text:"קיים מרחב נוסף המאפשר פעילות של 150 סטודנטים לפחות", critical:true },
  ]},
  { title: "פעילות קבועה לכל סניף", items: [
    { id:"s2i1", text:"פעילות ערב מתקיימת פעמיים בשבוע (ימים א'-ה'), לפחות שעתיים וחצי בכל פעם", critical:true },
    { id:"s2i2", text:"נוכחות רכז מקומי בזמן הפעילות (או מחליף מטעמו בהיעדרות)" },
    { id:"s2i3", text:"קיימת זמינות טלפונית לסטודנטים בנושאי זהות יהודית" },
    { id:"s2i4", text:"מופעל מערך התנדבות סטודנטים בקהילה המקומית הסמוכה למוסד" },
  ]},
  { title: "פעילות מיוחדת — מפגשי לימוד (אחת לשבוע לפחות)", items: [
    { id:"s3i1", text:"מתקיימת סדנא/הרצאה ע\"י גורם חיצוני לפחות אחת לשבוע, פתוחה לכלל הסטודנטים", critical:true },
    { id:"s3i2", text:"משך המפגש 45 דקות לפחות", critical:true },
    { id:"s3i3", text:"הנושא פורסם מראש באופן שמוביל לחשיפה רחבה" },
    { id:"s3i4", text:"הפעילות עוסקת בנושאים הנוגעים לזהות היהודית" },
  ]},
  { title: "פעילות מיוחדת — הרצאה ייחודית (אחת לחודש לפחות)", items: [
    { id:"s4i1", text:"מתקיימת הרצאה ייחודית לפחות אחת לחודש, המיועדת ל-50 סטודנטים לפחות", critical:true },
    { id:"s4i2", text:"משך ההרצאה שעה וחצי לפחות", critical:true },
    { id:"s4i3", text:"פורסמה לפחות שבועיים מראש על הגעת המרצה" },
    { id:"s4i4", text:"הוגש כיבוד קל במהלך המפגש (עוגות, שתייה קלה, פיצוחים)" },
  ]},
  { title: "פעילות מיוחדת — עונג שבת (לפי ביקוש, עד פעם בחודש)", items: [
    { id:"s5i1", text:"השתתפות של 15 סטודנטים לפחות, למשך שעה וחצי לפחות", critical:true },
    { id:"s5i2", text:"נערכה פעילות בנושא זהות יהודית" },
    { id:"s5i3", text:"הוגש כיבוד קל" },
  ]},
  { title: "אירועי שיא — סמוך לחגי ישראל", items: [
    { id:"s6i1", text:"מתקיימים אירועי שיא חווייתיים בסמוך לחגי ישראל", critical:true },
    { id:"s6i2", text:"האירוע פנה לקהל רחב של סטודנטים מזדמנים (לא רק קבוצה קבועה)" },
    { id:"s6i3", text:"האירוע מבוסס על מעגל השנה היהודי והציוני" },
  ]},
  { title: "כוח אדם וניהול", items: [
    { id:"s7i1", text:"בסניף ממונה רכז מקומי שמכיר את המוסד הספציפי" },
    { id:"s7i2", text:"פתיחת הסניף אושרה מראש על ידי המשרד" },
    { id:"s7i3", text:"הפעילות בתיאום ואישור המוסד, ובעדיפות גם עם אגודת הסטודנטים" },
  ]},
  { title: "דיווח ובקרה", items: [
    { id:"s8i1", text:"מוגש דוח ביצוע חודשי (ב-1 לחודש) בקובץ Excel ובנוסח נספח 14" },
    { id:"s8i2", text:"מדי רבעון מועברת רשימת הסניפים הפעילים למשרד" },
    { id:"s8i3", text:"הדוח כולל פירוט: מועדי פעילות, תוכן השירות, מספר משתתפים לכל פעילות" },
    { id:"s8i4", text:"מצורפת כרטסת הנהלת חשבונות להוכחת ההוצאה בפועל" },
  ]},
];

const state = {};

function buildUI() {
  const cont = document.getElementById('sections-container');
  SECTIONS.forEach(sec => {
    const sd = document.createElement('div');
    sd.className = 'section';
    const st = document.createElement('div');
    st.className = 'section-title';
    st.textContent = sec.title;
    sd.appendChild(st);
    sec.items.forEach(item => {
      state[item.id] = { status: null, note: '' };
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML =
        '<div class="item-row">' +
          '<div class="item-text">' +
            (item.critical ? '<span class="tag-critical">חובה</span>' : '') +
            item.text +
          '</div>' +
          '<div class="radio-group">' +
            '<button class="radio-btn" id="ok-' + item.id + '" onclick="setStatus(\'' + item.id + '\',\'ok\')">✓ תקין</button>' +
            '<button class="radio-btn" id="nok-' + item.id + '" onclick="setStatus(\'' + item.id + '\',\'nok\')">✗ לא תקין</button>' +
          '</div>' +
        '</div>' +
        '<div class="note-wrap">' +
          '<textarea class="note-input" id="note-' + item.id + '" placeholder="הערה (אופציונלי)..." rows="1" ' +
            'oninput="saveNote(\'' + item.id + '\',this.value);autoGrow(this)"></textarea>' +
        '</div>';
      sd.appendChild(card);
    });
    cont.appendChild(sd);
  });
  setDefaultDate();
  updateProgress();
}

function setDefaultDate() {
  const d = new Date();
  const iso = d.toISOString().split('T')[0];
  document.getElementById('visit-date').value = iso;
}

function setStatus(id, val) {
  const prev = state[id].status;
  state[id].status = (prev === val) ? null : val;
  const okBtn = document.getElementById('ok-' + id);
  const nokBtn = document.getElementById('nok-' + id);
  okBtn.className = 'radio-btn' + (state[id].status === 'ok' ? ' ok' : '');
  nokBtn.className = 'radio-btn' + (state[id].status === 'nok' ? ' nok' : '');
  updateProgress();
}

function saveNote(id, val) { state[id].note = val; }

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function updateProgress() {
  const ids = Object.keys(state);
  const filled = ids.filter(k => state[k].status !== null).length;
  const ok = ids.filter(k => state[k].status === 'ok').length;
  const nok = ids.filter(k => state[k].status === 'nok').length;
  const pct = ids.length ? Math.round(filled / ids.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('lbl-total').textContent = filled + ' מתוך ' + ids.length + ' מולאו';
  document.getElementById('lbl-ok').textContent = '✓ ' + ok + ' תקין';
  document.getElementById('lbl-nok').textContent = '✗ ' + nok + ' לא תקין';
}

function showSummary() {
  const nokItems = [], noteItems = [];
  const ids = Object.keys(state);
  const ok = ids.filter(k => state[k].status === 'ok').length;
  const nok = ids.filter(k => state[k].status === 'nok').length;
  const unfilled = ids.filter(k => state[k].status === null).length;

  SECTIONS.forEach(sec => {
    sec.items.forEach(item => {
      const s = state[item.id];
      if (s.status === 'nok') nokItems.push({ section: sec.title, text: item.text, note: s.note, critical: item.critical });
      if (s.note && s.note.trim() && s.status !== 'nok') noteItems.push({ section: sec.title, text: item.text, note: s.note.trim(), status: s.status });
    });
  });

  let html = '<div class="summary-box">';
  html += '<div class="summary-stats">';
  html += '<div class="stat stat-ok"><div class="stat-num">' + ok + '</div><div class="stat-label">תקין</div></div>';
  html += '<div class="stat stat-nok"><div class="stat-num">' + nok + '</div><div class="stat-label">לא תקין</div></div>';
  html += '<div class="stat stat-pend"><div class="stat-num">' + unfilled + '</div><div class="stat-label">לא מולא</div></div>';
  html += '</div>';

  html += '<div class="summary-section-header summary-nok-header">ממצאים שאינם תקינים (' + nokItems.length + ')</div>';
  html += '<div class="summary-body">';
  if (!nokItems.length) {
    html += '<div class="empty-msg">לא נמצאו ממצאים שאינם תקינים</div>';
  } else {
    nokItems.forEach(it => {
      html += '<div class="summary-item">';
      html += '<div class="summary-section-label">' + it.section + (it.critical ? ' · <strong>חובה</strong>' : '') + '</div>';
      html += it.text;
      if (it.note) html += '<div class="summary-note-label">הערה: ' + it.note + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '<div class="summary-section-header summary-notes-header" style="border-top:1px solid #e0e0dc;">ריכוז הערות (' + noteItems.length + ')</div>';
  html += '<div class="summary-body">';
  if (!noteItems.length) {
    html += '<div class="empty-msg">לא הוזנו הערות נוספות</div>';
  } else {
    noteItems.forEach(it => {
      html += '<div class="summary-item">';
      html += '<div class="summary-section-label">' + it.section + '</div>';
      html += it.text;
      html += '<div class="summary-note-label">הערה: ' + it.note + '</div>';
      html += '</div>';
    });
  }
  html += '</div></div>';

  const box = document.getElementById('summary-box');
  box.innerHTML = html;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function submitForm() {
  const inspector = document.getElementById('inspector').value.trim();
  const branch = document.getElementById('branch').value.trim();
  const institution = document.getElementById('institution').value.trim();
  const visitDate = document.getElementById('visit-date').value;

  if (!inspector || !branch || !institution) {
    showToast('נא למלא שם בקר, שם סניף ומוסד אקדמי לפני השליחה.', 'error');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  const payload = {
    inspector: inspector,
    branch: branch,
    institution: institution,
    visitDate: visitDate
  };
  Object.keys(state).forEach(id => {
    payload[id] = state[id];
  });

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'שולח...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    showToast('הדוח נשלח בהצלחה ונשמר ב-Google Sheets ✓', 'success');
    btn.textContent = 'נשלח בהצלחה ✓';
    btn.style.background = '#3B6D11';
  })
  .catch(() => {
    showToast('שגיאה בשליחה — בדוק חיבור לאינטרנט ונסה שוב.', 'error');
    btn.disabled = false;
    btn.textContent = 'שלח דוח לגוגל שיטס ↗';
  });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  if (type === 'success') return;
  setTimeout(() => { t.style.display = 'none'; }, 5000);
}

buildUI();
</script>
</body>
</html>
