<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקרת שטח — תכנית ב' מעגל השנה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; direction: rtl; font-size: 15px; }
  .page { max-width: 780px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header { background: #fff; border-radius: 12px; border: 1px solid #e0e0dc; padding: 18px 20px; margin-bottom: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #666; }

  /* Meta fields */
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .meta-field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  .meta-field input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif; background: #fff; }
  .meta-field input:focus { outline: none; border-color: #888; }

  /* Progress */
  .progress-wrap { background: #fff; border-radius: 10px; border: 1px solid #e0e0dc; padding: 12px 16px; margin-bottom: 16px; }
  .progress-labels { display: flex; gap: 16px; font-size: 13px; margin-bottom: 6px; }
  .prog-ok { color: #3B6D11; font-weight: 500; }
  .prog-nok { color: #A32D2D; font-weight: 500; }
  .prog-neutral { color: #666; }
  .prog-bar { background: #eee; border-radius: 99px; height: 6px; overflow: hidden; }
  .prog-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; width: 0%; }

  /* Section */
  .section { margin-bottom: 14px; }
  .section-title { font-size: 12px; font-weight: 700; color: #555; letter-spacing: 0.05em; text-transform: uppercase; padding: 0 4px 6px; border-bottom: 1px solid #e0e0dc; margin-bottom: 8px; }

  /* Item card */
  .item-card { background: #fff; border: 1px solid #e0e0dc; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; }
  .item-text { flex: 1; font-size: 13.5px; line-height: 1.55; padding-top: 2px; }
  .tag-critical { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 99px; background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; margin-left: 5px; vertical-align: middle; font-weight: 600; }

  /* Radio buttons */
  .radio-group { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .radio-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid #ccc; cursor: pointer; background: transparent; color: #666; transition: all 0.15s; white-space: nowrap; text-align: center; min-width: 72px; font-family: Arial, sans-serif; }
  .radio-btn:hover { background: #f0f0ee; }
  .radio-btn.ok { background: #EAF3DE; color: #3B6D11; border-color: #97C459; font-weight: 600; }
  .radio-btn.nok { background: #FCEBEB; color: #A32D2D; border-color: #F09595; font-weight: 600; }

  /* Note */
  .note-wrap { margin-top: 7px; }
  .note-input { width: 100%; font-size: 12px; border: 1px solid #e0e0dc; border-radius: 8px; padding: 5px 8px; background: #fafaf8; color: #1a1a1a; font-family: Arial, sans-serif; resize: none; overflow: hidden; min-height: 30px; }
  .note-input:focus { outline: none; border-color: #aaa; }
  .note-input::placeholder { color: #aaa; }

  /* Submit */
  .submit-wrap { margin-top: 20px; margin-bottom: 30px; }
  .submit-btn { width: 100%; padding: 14px; background: #185FA5; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s; }
  .submit-btn:hover { background: #0C447C; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* Toast */
  .toast { display: none; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-top: 12px; text-align: center; font-weight: 500; }
  .toast.success { background: #EAF3DE; color: #3B6D11; border: 1px solid #97C459; }
  .toast.error { background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; }

  /* Summary */
  .summary-btn { width: 100%; padding: 11px; background: #f0f0ee; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: Arial, sans-serif; margin-bottom: 14px; color: #333; }
  .summary-btn:hover { background: #e8e8e5; }
  .summary-box { background: #fff; border: 1px solid #e0e0dc; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .summary-stats { display: flex; border-bottom: 1px solid #e0e0dc; }
  .stat { flex: 1; padding: 10px 8px; text-align: center; border-left: 1px solid #e0e0dc; }
  .stat:last-child { border-left: none; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #666; margin-top: 1px; }
  .stat-ok .stat-num { color: #3B6D11; }
  .stat-nok .stat-num { color: #A32D2D; }
  .stat-pend .stat-num { color: #666; }
  .summary-section-header { padding: 9px 14px; font-size: 13px; font-weight: 700; border-bottom: 1px solid; }
  .summary-nok-header { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .summary-notes-header { background: #E6F1FB; color: #185FA5; border-color: #85B7EB; }
  .summary-body { padding: 8px 14px; }
  .summary-item { font-size: 13px; padding: 7px 0; border-bottom: 1px solid #f0f0ee; line-height: 1.5; }
  .summary-item:last-child { border-bottom: none; }
  .summary-section-label { font-size: 11px; color: #888; margin-bottom: 1px; }
  .summary-note-label { font-size: 11px; color: #666; margin-top: 3px; }
  .empty-msg { font-size: 13px; color: #888; padding: 8px 0; }

  @media (max-width: 500px) {
    .meta-grid { grid-template-columns: 1fr; }
    .radio-btn { min-width: 62px; padding: 4px 8px; }
  }

  /* History section */
  .history-btn { width: 100%; padding: 11px; background: #E6F1FB; border: 1px solid #85B7EB; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: Arial, sans-serif; margin-bottom: 14px; color: #185FA5; }
  .history-btn:hover { background: #d0e6f7; }
  .history-box { background: #fff; border: 1px solid #e0e0dc; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .history-header { padding: 10px 14px; font-size: 13px; font-weight: 700; background: #E6F1FB; color: #185FA5; border-bottom: 1px solid #85B7EB; display: flex; justify-content: space-between; align-items: center; }
  .history-loading { padding: 20px; text-align: center; color: #666; font-size: 13px; }
  .history-item { padding: 10px 14px; border-bottom: 1px solid #f0f0ee; }
  .history-item:last-child { border-bottom: none; }
  .history-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .history-item-info { font-size: 13px; color: #333; line-height: 1.5; }
  .history-item-date { font-size: 11px; color: #888; }
  .history-item-actions { display: flex; gap: 5px; flex-shrink: 0; }
  .hist-edit-btn { font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 1px solid #85B7EB; color: #185FA5; background: transparent; cursor: pointer; font-family: Arial, sans-serif; }
  .hist-edit-btn:hover { background: #E6F1FB; }
  .hist-del-btn { font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 1px solid #F09595; color: #A32D2D; background: transparent; cursor: pointer; font-family: Arial, sans-serif; }
  .hist-del-btn:hover { background: #FCEBEB; }
  .history-stats { display: flex; gap: 10px; font-size: 12px; margin-top: 4px; }
  .h-ok { color: #3B6D11; font-weight: 600; }
  .h-nok { color: #A32D2D; font-weight: 600; }
  /* Edit modal in checklist */
  .c-modal-overlay { display: none; position: fixed; top:0; right:0; left:0; bottom:0; background: rgba(0,0,0,0.45); z-index: 1000; overflow-y: auto; padding: 30px 16px; }
  .c-modal-overlay.open { display: block; }
  .c-modal { background: #fff; border-radius: 14px; width: 100%; max-width: 680px; margin: 0 auto; padding: 20px; }
  .c-modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .c-modal-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .c-modal-field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; font-weight: 600; }
  .c-modal-field input { width: 100%; padding: 6px 9px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; font-family: Arial, sans-serif; }
  .c-modal-field input:focus { outline: none; border-color: #888; }
  .c-modal-sec { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 0 5px; border-bottom: 1px solid #e0e0dc; margin-bottom: 5px; margin-top: 10px; }
  .c-modal-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 6px; border-radius: 7px; margin-bottom: 3px; background: #fafaf8; }
  .c-modal-item-text { flex: 1; font-size: 12px; line-height: 1.5; padding-top: 2px; }
  .c-modal-radios { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .c-modal-radio { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid #ccc; cursor: pointer; background: transparent; color: #666; font-family: Arial, sans-serif; min-width: 62px; text-align: center; }
  .c-modal-radio:hover { background: #f0f0ee; }
  .c-modal-radio.ok { background: #EAF3DE; color: #3B6D11; border-color: #97C459; font-weight: 600; }
  .c-modal-radio.nok { background: #FCEBEB; color: #A32D2D; border-color: #F09595; font-weight: 600; }
  .c-modal-note { width: 100%; margin-top: 3px; font-size: 11px; border: 1px solid #e0e0dc; border-radius: 6px; padding: 3px 7px; font-family: Arial, sans-serif; background: #fff; resize: none; min-height: 26px; }
  .c-modal-note:focus { outline: none; border-color: #aaa; }
  .c-modal-footer { display: flex; gap: 10px; margin-top: 16px; }
  .c-modal-save { padding: 9px 20px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; }
  .c-modal-save:hover { background: #0C447C; }
  .c-modal-cancel { padding: 9px 16px; background: #f5f5f3; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: Arial, sans-serif; color: #555; }
  .c-modal-msg { font-size: 13px; padding: 7px 12px; border-radius: 7px; margin-top: 8px; display: none; }
  .c-modal-msg.success { background: #EAF3DE; color: #3B6D11; display: block; }
  .c-modal-msg.error { background: #FCEBEB; color: #A32D2D; display: block; }
  @media (max-width: 500px) { .c-modal-meta { grid-template-columns: 1fr; } }

</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>בקרת שטח — תכנית ב׳: אירועים במעגל השנה</h1>
    <p>מלא את כל הסעיפים ולחץ "שלח דוח" — הנתונים יישמרו אוטומטית ב-Google Sheets</p>
  </div>

  <div class="meta-grid">
    <div class="meta-field">
      <label>שם הבקר</label>
      <input type="text" id="inspector" placeholder="שם מלא..." />
    </div>
    <div class="meta-field">
      <label>תאריך הבקרה</label>
      <input type="date" id="visit-date" />
    </div>
    <div class="meta-field">
      <label>שם הסניף</label>
      <input type="text" id="branch" placeholder="שם הסניף / מיקום..." />
    </div>
    <div class="meta-field">
      <label>מוסד אקדמי</label>
      <input type="text" id="institution" placeholder="שם המוסד..." />
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-labels">
      <span class="prog-neutral" id="lbl-total">0 מתוך 0 מולאו</span>
      <span class="prog-ok" id="lbl-ok">✓ 0 תקין</span>
      <span class="prog-nok" id="lbl-nok">✗ 0 לא תקין</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  </div>

  <div id="sections-container"></div>


  <button class="history-btn" onclick="loadHistory()">הבקרות שלי ↓</button>
  <div id="history-box" style="display:none;"></div>

  <button class="summary-btn" onclick="showSummary()">הצג ריכוז ממצאים ↓</button>
  <div id="summary-box" style="display:none;"></div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">שלח דוח לגוגל שיטס ↗</button>
    <div class="toast" id="toast"></div>
  </div>

</div>


<!-- Edit modal for checklist -->
<div class="c-modal-overlay" id="c-edit-modal">
  <div class="c-modal">
    <div class="c-modal-title">עריכת בקרה</div>
    <div class="c-modal-meta">
      <div class="c-modal-field"><label>תאריך</label><input type="date" id="cm-date"></div>
      <div class="c-modal-field"><label>שם בקר</label><input type="text" id="cm-inspector"></div>
      <div class="c-modal-field"><label>שם סניף</label><input type="text" id="cm-branch"></div>
      <div class="c-modal-field"><label>מוסד אקדמי</label><input type="text" id="cm-institution"></div>
    </div>
    <div id="cm-items-container"></div>
    <div class="c-modal-footer">
      <button class="c-modal-save" onclick="saveCEdit()">שמור שינויים</button>
      <button class="c-modal-cancel" onclick="closeCModal()">ביטול</button>
    </div>
    <div class="c-modal-msg" id="cm-msg"></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYdcDqUglwWSe1lKKZYlHiJOxK8dOCJ9-wFAzy5bd9HTjHEp9D_RG_tw_qVn-2yukF/exec";

const SECTIONS = [
  { title: "מיקום ומבנה פיזי", items: [
    { id:"s1i1", text:"הפעילות מתקיימת בתוך הקמפוס או בסמיכות אליו, בתיאום ואישור המוסד האקדמי" },
    { id:"s1i2", text:"קיים חדר פעילות קבועה המכיל 50+ סטודנטים בו-זמנית", critical:true },
    { id:"s1i3", text:"קיים מרחב נוסף המאפשר פעילות של 150 סטודנטים לפחות", critical:true },
  ]},
  { title: "פעילות קבועה לכל סניף", items: [
    { id:"s2i1", text:"פעילות ערב מתקיימת פעמיים בשבוע (ימים א'-ה'), לפחות שעתיים וחצי בכל פעם", critical:true },
    { id:"s2i2", text:"נוכחות רכז מקומי בזמן הפעילות (או מחליף מטעמו בהיעדרות)" },
    { id:"s2i3", text:"קיימת זמינות טלפונית לסטודנטים בנושאי זהות יהודית" },
    { id:"s2i4", text:"מופעל מערך התנדבות סטודנטים בקהילה המקומית הסמוכה למוסד" },
  ]},
  { title: "פעילות מיוחדת — מפגשי לימוד (אחת לשבוע לפחות)", items: [
    { id:"s3i1", text:"מתקיימת סדנא/הרצאה ע\"י גורם חיצוני לפחות אחת לשבוע, פתוחה לכלל הסטודנטים", critical:true },
    { id:"s3i2", text:"משך המפגש 45 דקות לפחות", critical:true },
    { id:"s3i3", text:"הנושא פורסם מראש באופן שמוביל לחשיפה רחבה" },
    { id:"s3i4", text:"הפעילות עוסקת בנושאים הנוגעים לזהות היהודית" },
  ]},
  { title: "פעילות מיוחדת — הרצאה ייחודית (אחת לחודש לפחות)", items: [
    { id:"s4i1", text:"מתקיימת הרצאה ייחודית לפחות אחת לחודש, המיועדת ל-50 סטודנטים לפחות", critical:true },
    { id:"s4i2", text:"משך ההרצאה שעה וחצי לפחות", critical:true },
    { id:"s4i3", text:"פורסמה לפחות שבועיים מראש על הגעת המרצה" },
    { id:"s4i4", text:"הוגש כיבוד קל במהלך המפגש (עוגות, שתייה קלה, פיצוחים)" },
  ]},
  { title: "פעילות מיוחדת — עונג שבת (לפי ביקוש, עד פעם בחודש)", items: [
    { id:"s5i1", text:"השתתפות של 15 סטודנטים לפחות, למשך שעה וחצי לפחות", critical:true },
    { id:"s5i2", text:"נערכה פעילות בנושא זהות יהודית" },
    { id:"s5i3", text:"הוגש כיבוד קל" },
  ]},
  { title: "אירועי שיא — סמוך לחגי ישראל", items: [
    { id:"s6i1", text:"מתקיימים אירועי שיא חווייתיים בסמוך לחגי ישראל", critical:true },
    { id:"s6i2", text:"האירוע פנה לקהל רחב של סטודנטים מזדמנים (לא רק קבוצה קבועה)" },
    { id:"s6i3", text:"האירוע מבוסס על מעגל השנה היהודי והציוני" },
  ]},
  { title: "כוח אדם וניהול", items: [
    { id:"s7i1", text:"בסניף ממונה רכז מקומי שמכיר את המוסד הספציפי" },
    { id:"s7i2", text:"פתיחת הסניף אושרה מראש על ידי המשרד" },
    { id:"s7i3", text:"הפעילות בתיאום ואישור המוסד, ובעדיפות גם עם אגודת הסטודנטים" },
  ]},
  { title: "דיווח ובקרה", items: [
    { id:"s8i1", text:"מוגש דוח ביצוע חודשי (ב-1 לחודש) בקובץ Excel ובנוסח נספח 14" },
    { id:"s8i2", text:"מדי רבעון מועברת רשימת הסניפים הפעילים למשרד" },
    { id:"s8i3", text:"הדוח כולל פירוט: מועדי פעילות, תוכן השירות, מספר משתתפים לכל פעילות" },
    { id:"s8i4", text:"מצורפת כרטסת הנהלת חשבונות להוכחת ההוצאה בפועל" },
  ]},
];

const state = {};

function buildUI() {
  const cont = document.getElementById('sections-container');
  SECTIONS.forEach(sec => {
    const sd = document.createElement('div');
    sd.className = 'section';
    const st = document.createElement('div');
    st.className = 'section-title';
    st.textContent = sec.title;
    sd.appendChild(st);
    sec.items.forEach(item => {
      state[item.id] = { status: null, note: '' };
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML =
        '<div class="item-row">' +
          '<div class="item-text">' +
            (item.critical ? '<span class="tag-critical">חובה</span>' : '') +
            item.text +
          '</div>' +
          '<div class="radio-group">' +
            '<button class="radio-btn" id="ok-' + item.id + '" onclick="setStatus(\'' + item.id + '\',\'ok\')">✓ תקין</button>' +
            '<button class="radio-btn" id="nok-' + item.id + '" onclick="setStatus(\'' + item.id + '\',\'nok\')">✗ לא תקין</button>' +
          '</div>' +
        '</div>' +
        '<div class="note-wrap">' +
          '<textarea class="note-input" id="note-' + item.id + '" placeholder="הערה (אופציונלי)..." rows="1" ' +
            'oninput="saveNote(\'' + item.id + '\',this.value);autoGrow(this)"></textarea>' +
        '</div>';
      sd.appendChild(card);
    });
    cont.appendChild(sd);
  });
  setDefaultDate();
  updateProgress();
}

function setDefaultDate() {
  const d = new Date();
  const iso = d.toISOString().split('T')[0];
  document.getElementById('visit-date').value = iso;
}

function setStatus(id, val) {
  const prev = state[id].status;
  state[id].status = (prev === val) ? null : val;
  const okBtn = document.getElementById('ok-' + id);
  const nokBtn = document.getElementById('nok-' + id);
  okBtn.className = 'radio-btn' + (state[id].status === 'ok' ? ' ok' : '');
  nokBtn.className = 'radio-btn' + (state[id].status === 'nok' ? ' nok' : '');
  updateProgress();
}

function saveNote(id, val) { state[id].note = val; }

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function updateProgress() {
  const ids = Object.keys(state);
  const filled = ids.filter(k => state[k].status !== null).length;
  const ok = ids.filter(k => state[k].status === 'ok').length;
  const nok = ids.filter(k => state[k].status === 'nok').length;
  const pct = ids.length ? Math.round(filled / ids.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('lbl-total').textContent = filled + ' מתוך ' + ids.length + ' מולאו';
  document.getElementById('lbl-ok').textContent = '✓ ' + ok + ' תקין';
  document.getElementById('lbl-nok').textContent = '✗ ' + nok + ' לא תקין';
}

function showSummary() {
  const nokItems = [], noteItems = [];
  const ids = Object.keys(state);
  const ok = ids.filter(k => state[k].status === 'ok').length;
  const nok = ids.filter(k => state[k].status === 'nok').length;
  const unfilled = ids.filter(k => state[k].status === null).length;

  SECTIONS.forEach(sec => {
    sec.items.forEach(item => {
      const s = state[item.id];
      if (s.status === 'nok') nokItems.push({ section: sec.title, text: item.text, note: s.note, critical: item.critical });
      if (s.note && s.note.trim() && s.status !== 'nok') noteItems.push({ section: sec.title, text: item.text, note: s.note.trim(), status: s.status });
    });
  });

  let html = '<div class="summary-box">';
  html += '<div class="summary-stats">';
  html += '<div class="stat stat-ok"><div class="stat-num">' + ok + '</div><div class="stat-label">תקין</div></div>';
  html += '<div class="stat stat-nok"><div class="stat-num">' + nok + '</div><div class="stat-label">לא תקין</div></div>';
  html += '<div class="stat stat-pend"><div class="stat-num">' + unfilled + '</div><div class="stat-label">לא מולא</div></div>';
  html += '</div>';

  html += '<div class="summary-section-header summary-nok-header">ממצאים שאינם תקינים (' + nokItems.length + ')</div>';
  html += '<div class="summary-body">';
  if (!nokItems.length) {
    html += '<div class="empty-msg">לא נמצאו ממצאים שאינם תקינים</div>';
  } else {
    nokItems.forEach(it => {
      html += '<div class="summary-item">';
      html += '<div class="summary-section-label">' + it.section + (it.critical ? ' · <strong>חובה</strong>' : '') + '</div>';
      html += '<strong style="color:#A32D2D;">לא קיים הנדרש:</strong> ' + it.text;
      if (it.note) html += '<div class="summary-note-label">הערת בקר: ' + it.note + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '<div class="summary-section-header summary-notes-header" style="border-top:1px solid #e0e0dc;">ריכוז הערות (' + noteItems.length + ')</div>';
  html += '<div class="summary-body">';
  if (!noteItems.length) {
    html += '<div class="empty-msg">לא הוזנו הערות נוספות</div>';
  } else {
    noteItems.forEach(it => {
      html += '<div class="summary-item">';
      html += '<div class="summary-section-label">' + it.section + '</div>';
      html += it.text;
      html += '<div class="summary-note-label">הערה: ' + it.note + '</div>';
      html += '</div>';
    });
  }
  html += '</div></div>';

  const box = document.getElementById('summary-box');
  box.innerHTML = html;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function submitForm() {
  const inspector = document.getElementById('inspector').value.trim();
  const branch = document.getElementById('branch').value.trim();
  const institution = document.getElementById('institution').value.trim();
  const visitDate = document.getElementById('visit-date').value;

  if (!inspector || !branch || !institution) {
    showToast('נא למלא שם בקר, שם סניף ומוסד אקדמי לפני השליחה.', 'error');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  const payload = {
    inspector: inspector,
    branch: branch,
    institution: institution,
    visitDate: visitDate
  };
  Object.keys(state).forEach(id => {
    payload[id] = state[id];
  });

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'שולח...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    showToast('הדוח נשלח בהצלחה ונשמר ב-Google Sheets ✓', 'success');
    btn.textContent = 'נשלח בהצלחה ✓';
    btn.style.background = '#3B6D11';
  })
  .catch(() => {
    showToast('שגיאה בשליחה — בדוק חיבור לאינטרנט ונסה שוב.', 'error');
    btn.disabled = false;
    btn.textContent = 'שלח דוח לגוגל שיטס ↗';
  });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  if (type === 'success') return;
  setTimeout(() => { t.style.display = 'none'; }, 5000);
}

buildUI();

// ===== היסטוריית בקרות =====
const ALL_IDS_C = ["s1i1","s1i2","s1i3","s2i1","s2i2","s2i3","s2i4","s3i1","s3i2","s3i3","s3i4","s4i1","s4i2","s4i3","s4i4","s5i1","s5i2","s5i3","s6i1","s6i2","s6i3","s7i1","s7i2","s7i3","s8i1","s8i2","s8i3","s8i4"];
const ITEM_LABELS_C = {s1i1:"מיקום — בתוך/סמוך לקמפוס",s1i2:"חדר ל-50+ סטודנטים",s1i3:"מרחב נוסף ל-150+ סטודנטים",s2i1:"פעילות ערב פעמיים בשבוע",s2i2:"נוכחות רכז מקומי",s2i3:"זמינות טלפונית",s2i4:"מערך התנדבות בקהילה",s3i1:"מפגש לימוד שבועי",s3i2:"45 דק' לפחות",s3i3:"נושא פורסם מראש",s3i4:"תוכן זהות יהודית",s4i1:"הרצאה ייחודית — 50+ סטודנטים",s4i2:"90 דק' לפחות",s4i3:"פרסום שבועיים מראש",s4i4:"כיבוד קל בהרצאה",s5i1:"עונג שבת — 15+ סטודנטים",s5i2:"פעילות זהות יהודית",s5i3:"כיבוד קל",s6i1:"אירועי שיא סמוך לחגים",s6i2:"פתוח לסטודנטים מזדמנים",s6i3:"תוכן מעגל השנה",s7i1:"רכז מקומי ממונה",s7i2:"פתיחת סניף אושרה",s7i3:"תיאום עם המוסד",s8i1:"דוח חודשי — Excel + נספח 14",s8i2:"רשימת סניפים רבעונית",s8i3:"דוח כולל מועדים ומשתתפים",s8i4:"כרטסת הנה\"ח מצורפת"};
const SECTIONS_C = [{title:"מיקום ומבנה פיזי",ids:["s1i1","s1i2","s1i3"]},{title:"פעילות קבועה",ids:["s2i1","s2i2","s2i3","s2i4"]},{title:"מפגשי לימוד",ids:["s3i1","s3i2","s3i3","s3i4"]},{title:"הרצאה ייחודית",ids:["s4i1","s4i2","s4i3","s4i4"]},{title:"עונג שבת",ids:["s5i1","s5i2","s5i3"]},{title:"אירועי שיא",ids:["s6i1","s6i2","s6i3"]},{title:"כוח אדם וניהול",ids:["s7i1","s7i2","s7i3"]},{title:"דיווח ובקרה",ids:["s8i1","s8i2","s8i3","s8i4"]}];
const CRITICAL_C = ["s1i2","s1i3","s2i1","s3i1","s3i2","s4i1","s4i2","s5i1","s6i1"];

let myRows = [];
let cEditIndex = null;
let cEditState = {};

function loadHistory() {
  const inspectorVal = document.getElementById('inspector').value.trim();
  const box = document.getElementById('history-box');

  if (!inspectorVal) {
    box.style.display = 'block';
    box.innerHTML = '<div class="history-box"><div class="history-header">הבקרות שלי</div><div class="history-loading">נא למלא את שמך בשדה "שם הבקר" כדי לראות את הבקרות שלך</div></div>';
    return;
  }

  box.style.display = 'block';
  box.innerHTML = '<div class="history-box"><div class="history-header">הבקרות שלי — ' + inspectorVal + '</div><div class="history-loading">טוען...</div></div>';

  fetch(SCRIPT_URL + '?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const all = data.rows || [];
      myRows = all.filter(r => (r['שם בקר'] || '').trim() === inspectorVal);
      myRows.sort((a,b) => new Date(b['תאריך']) - new Date(a['תאריך']));
      renderHistory(inspectorVal);
    })
    .catch(() => {
      box.innerHTML = '<div class="history-box"><div class="history-header">הבקרות שלי</div><div class="history-loading" style="color:#A32D2D;">שגיאה בטעינה — בדוק חיבור לאינטרנט</div></div>';
    });
}

function renderHistory(name) {
  const box = document.getElementById('history-box');
  if (!myRows.length) {
    box.innerHTML = '<div class="history-box"><div class="history-header">הבקרות שלי — ' + name + '</div><div class="history-loading">לא נמצאו בקרות</div></div>';
    return;
  }

  let html = '<div class="history-box"><div class="history-header"><span>הבקרות שלי — ' + name + ' (' + myRows.length + ')</span></div>';
  myRows.forEach((r, i) => {
    const d = new Date(r['תאריך']);
    const dateStr = isNaN(d) ? r['תאריך'] : d.toLocaleDateString('he-IL');
    const ok = ALL_IDS_C.filter(id => r[id] === 'ok').length;
    const nok = ALL_IDS_C.filter(id => r[id] === 'nok').length;
    const origIndex = findOrigIndex(r);
    html += '<div class="history-item">' +
      '<div class="history-item-top">' +
        '<div class="history-item-info">' +
          '<strong>' + (r['שם סניף'] || '') + '</strong>' +
          (r['מוסד אקדמי'] ? ' — ' + r['מוסד אקדמי'] : '') +
          '<div class="history-item-date">' + dateStr + '</div>' +
          '<div class="history-stats">' +
            '<span class="h-ok">✓ ' + ok + ' תקין</span>' +
            (nok > 0 ? '<span class="h-nok">✗ ' + nok + ' לא תקין</span>' : '<span style="color:#aaa">ללא ממצאים</span>') +
          '</div>' +
        '</div>' +
        '<div class="history-item-actions">' +
          '<button class="hist-edit-btn" onclick="openCEdit(' + i + ',' + origIndex + ')">עריכה</button>' +
          '<button class="hist-del-btn" onclick="confirmCDelete(' + i + ',' + origIndex + ')">מחיקה</button>' +
        '</div>' +
      '</div>' +
      '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function findOrigIndex(r) {
  // We need to call doGet to get the index, so we pass a sentinel
  // Instead we store rowIndex in myRows when we loaded
  return myRows.indexOf(r); // placeholder — actual delete uses name+date match via Apps Script action
}

function openCEdit(myIdx, origIdx) {
  cEditIndex = myIdx;
  const r = myRows[myIdx];
  cEditState = {};
  ALL_IDS_C.forEach(id => {
    cEditState[id] = { status: r[id] || null, note: (r['הערות_' + id] || '').toString().trim() };
  });

  const d = new Date(r['תאריך']);
  document.getElementById('cm-date').value = isNaN(d) ? '' : d.toISOString().split('T')[0];
  document.getElementById('cm-inspector').value = r['שם בקר'] || '';
  document.getElementById('cm-branch').value = r['שם סניף'] || '';
  document.getElementById('cm-institution').value = r['מוסד אקדמי'] || '';

  const cont = document.getElementById('cm-items-container');
  let html = '';
  SECTIONS_C.forEach(sec => {
    html += '<div class="c-modal-sec">' + sec.title + '</div>';
    sec.ids.forEach(id => {
      const s = cEditState[id];
      const crit = CRITICAL_C.includes(id) ? '<span style="font-size:10px;padding:1px 5px;border-radius:99px;background:#FCEBEB;color:#A32D2D;border:1px solid #F09595;margin-left:4px;">חובה</span>' : '';
      html += '<div class="c-modal-item" id="cmitem-' + id + '">' +
        '<div class="c-modal-item-text">' + crit + ITEM_LABELS_C[id] + '</div>' +
        '<div class="c-modal-radios">' +
          '<button class="c-modal-radio' + (s.status === 'ok' ? ' ok' : '') + '" onclick="setCEditStatus(\'' + id + '\',\'ok\')">✓ תקין</button>' +
          '<button class="c-modal-radio' + (s.status === 'nok' ? ' nok' : '') + '" onclick="setCEditStatus(\'' + id + '\',\'nok\')">✗ לא תקין</button>' +
        '</div>' +
        '</div>' +
        '<textarea class="c-modal-note" id="cmnote-' + id + '" placeholder="הערה..." rows="1" oninput="cEditState[\'' + id + '\'].note=this.value">' + (s.note || '') + '</textarea>';
    });
  });
  cont.innerHTML = html;
  document.getElementById('cm-msg').className = 'c-modal-msg';
  document.getElementById('cm-msg').textContent = '';
  document.getElementById('c-edit-modal').classList.add('open');
}

function setCEditStatus(id, val) {
  cEditState[id].status = (cEditState[id].status === val) ? null : val;
  const item = document.getElementById('cmitem-' + id);
  const btns = item.querySelectorAll('.c-modal-radio');
  btns[0].className = 'c-modal-radio' + (cEditState[id].status === 'ok' ? ' ok' : '');
  btns[1].className = 'c-modal-radio' + (cEditState[id].status === 'nok' ? ' nok' : '');
}

function closeCModal() {
  document.getElementById('c-edit-modal').classList.remove('open');
  cEditIndex = null;
}

function saveCEdit() {
  const r = myRows[cEditIndex];
  // find original row index in full dataset by matching תאריך + שם בקר + שם סניף
  const origKey = (r['תאריך'] || '') + '||' + (r['שם בקר'] || '') + '||' + (r['שם סניף'] || '');

  const payload = {
    action: 'updateByKey',
    origKey: origKey,
    visitDate: document.getElementById('cm-date').value,
    inspector: document.getElementById('cm-inspector').value.trim(),
    branch: document.getElementById('cm-branch').value.trim(),
    institution: document.getElementById('cm-institution').value.trim()
  };
  ALL_IDS_C.forEach(id => { payload[id] = { status: cEditState[id].status || '', note: cEditState[id].note || '' }; });

  const btn = document.querySelector('.c-modal-save');
  btn.disabled = true; btn.textContent = 'שומר...';

  fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
    .then(() => {
      // update local
      ALL_IDS_C.forEach(id => { r[id] = cEditState[id].status || ''; r['הערות_' + id] = cEditState[id].note || ''; });
      r['שם סניף'] = payload.branch;
      r['מוסד אקדמי'] = payload.institution;
      r['תאריך'] = payload.visitDate;
      const msg = document.getElementById('cm-msg');
      msg.textContent = 'נשמר בהצלחה ✓';
      msg.className = 'c-modal-msg success';
      btn.disabled = false; btn.textContent = 'שמור שינויים';
      setTimeout(() => { closeCModal(); renderHistory(payload.inspector); }, 1200);
    })
    .catch(() => {
      const msg = document.getElementById('cm-msg');
      msg.textContent = 'שגיאה — נסה שוב';
      msg.className = 'c-modal-msg error';
      btn.disabled = false; btn.textContent = 'שמור שינויים';
    });
}

function confirmCDelete(myIdx, origIdx) {
  const r = myRows[myIdx];
  const d = new Date(r['תאריך']);
  const dateStr = isNaN(d) ? r['תאריך'] : d.toLocaleDateString('he-IL');
  if (!confirm('למחוק את הבקרה מיום ' + dateStr + ' בסניף ' + (r['שם סניף'] || '') + '?')) return;

  const origKey = (r['תאריך'] || '') + '||' + (r['שם בקר'] || '') + '||' + (r['שם סניף'] || '');
  fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'deleteByKey', origKey }) })
    .then(() => {
      myRows.splice(myIdx, 1);
      renderHistory(r['שם בקר'] || '');
    })
    .catch(() => alert('שגיאה במחיקה'));
}
</script>
